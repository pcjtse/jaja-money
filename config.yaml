cache:
  ttl_seconds: 300
  disk_cache_dir: ~/.jaja-money/cache
  use_disk_cache: true

factor_weights:
  valuation: 0.15
  trend: 0.15
  rsi: 0.10
  macd: 0.10
  sentiment: 0.15
  earnings: 0.15
  analyst: 0.10
  range: 0.05
  alt_data: 0.05
  # Alpha feature weights
  congress: 0.05
  institutional_flow: 0.06
  estimate_velocity: 0.08
  buyback: 0.04
  guidance_quality: 0.06
  options_flow: 0.05
  dark_pool: 0.04
  supply_chain: 0.04
  special_situation: 0.06
  cross_asset: 0.04
  geo_revenue: 0.04
  crowding_risk: 0.0   # informational penalty, not additive weight
  regime: 0.0          # applied as multiplier, not additive weight

# P21.5: Alternative data signal settings
alt_data:
  enabled: true
  trends_weight: 0.5    # share of alt_data score from Google Trends
  jobs_weight: 0.5      # share of alt_data score from job posting velocity
  cache_ttl_hours: 6

risk:
  bands:
    extreme: 80
    high: 65
    elevated: 45
    moderate: 25

portfolio:
  max_positions:
    conservative: 5.0
    moderate: 10.0
    aggressive: 20.0

screener:
  default_universe:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA
    - BRK.B
    - JPM
    - JNJ
    - V
    - PG
    - XOM
    - HD
    - MA
    - BAC
    - PFE
    - AVGO
    - CVX
    - COST

sectors:
  etfs:
    - { ticker: XLK, name: Technology }
    - { ticker: XLF, name: Financials }
    - { ticker: XLE, name: Energy }
    - { ticker: XLV, name: Health Care }
    - { ticker: XLI, name: Industrials }
    - { ticker: XLY, name: Consumer Disc. }
    - { ticker: XLP, name: Consumer Staples }
    - { ticker: XLRE, name: Real Estate }
    - { ticker: XLB, name: Materials }
    - { ticker: XLU, name: Utilities }
    - { ticker: XLC, name: Communication }

display:
  chart_height: 500
  max_news_articles: 10

logging:
  level: INFO
  max_bytes: 10485760
  backup_count: 3

# P12.1: Webhook notification settings
webhooks:
  slack_url: ""
  discord_url: ""
  telegram_token: ""
  telegram_chat_id: ""
  app_url: ""  # Deep link base URL for alert messages

# P12.2: Google Sheets settings
google_sheets:
  spreadsheet_id: ""
  sheet_name: "jaja-money"
  credentials_path: ""  # Path to service account JSON
  append_log: true

# P10.1: Digest settings
digest:
  schedule_hour: 8   # UTC hour for daily digest
  schedule_minute: 0
  email: ""           # Delivery email address

# P14.2: Cache backend (disk or redis)
cache_backend:
  type: "disk"  # "disk" or "redis"
  redis_url: "redis://localhost:6379/0"

# P14.3: API server settings
api_server:
  port: 8080
  api_key: ""  # Set JAJA_API_KEY env var instead for security

# P9.6: AI backend selection
# "sdk"  — use the anthropic Python SDK (requires ANTHROPIC_API_KEY)
# "cli"  — use the Claude Code CLI binary (uses your existing claude session/credentials)
ai_backend: "sdk"

# OpenClaw integration settings
openclaw:
  skill_name: "jaja-money"
  # Set ALPACA_API_KEY / ALPACA_API_SECRET env vars for read-only Alpaca monitoring.
  # Note: real order execution is disabled; execute_signal() is simulation-only.
  alpaca_base_url: "https://paper-api.alpaca.markets"
  # Remote skill mode: set JAJA_API_URL env var to point the OpenClaw skill at a
  # running jaja-money server (local or remote) instead of importing modules directly.
  # Signal thresholds for BUY/SELL decisions
  signal_buy_factor_min: 65
  signal_buy_risk_max: 50
  signal_sell_factor_max: 35
  signal_sell_risk_min: 75
  # Event scheduler settings
  event_scheduler_interval_seconds: 300
  earnings_alert_days_ahead: 3

# Congressional trade tracker settings
congress:
  enabled: true
  lookback_days: 90
  cache_ttl_hours: 12

# 13F Institutional flow settings
institutional_flow:
  enabled: true
  snapshot_ttl_hours: 24

# Estimate revision velocity settings
estimate_revision:
  velocity_window_days: 60
  consecutive_threshold: 3

# Short squeeze + CTB enhancement
short_squeeze:
  ctb_high_threshold: 50.0
  ctb_moderate_threshold: 20.0
  gamma_squeeze_threshold: -20.0

# Options flow anomaly detector
options_flow:
  sweep_vol_oi_threshold: 3.0
  min_volume: 100
  iv_spike_multiplier: 1.5

# Event-driven catalyst calendar
catalyst_calendar:
  enabled: true
  days_ahead: 60

# Dark pool / ATS signal
dark_pool:
  enabled: true
  ats_spike_threshold: 1.5
  cache_ttl_hours: 48

# Market regime detector
market_regime:
  states: 5
  lookback_days: 252
  cache_ttl_hours: 1

# Cross-asset leading indicators
cross_asset:
  enabled: true
  cache_ttl_hours: 4

# Geographic revenue overlay
geo_revenue:
  enabled: true

# Supply chain risk
supply_chain:
  sole_source_penalty: 15
  high_risk_region_penalty: 10

# Buyback effectiveness
buyback:
  min_yield_pct: 1.0

# Special situations
special_situations:
  enabled: true
  cache_ttl_hours: 24

# Factor crowding risk
crowding:
  enabled: true
  high_similarity_threshold: 0.82
  extreme_similarity_threshold: 0.92
