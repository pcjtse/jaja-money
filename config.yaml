cache:
  ttl_seconds: 300
  disk_cache_dir: ~/.jaja-money/cache
  use_disk_cache: true

factor_weights:
  valuation: 0.15
  trend: 0.20
  rsi: 0.10
  macd: 0.10
  sentiment: 0.15
  earnings: 0.15
  analyst: 0.10
  range: 0.05

risk:
  bands:
    extreme: 80
    high: 65
    elevated: 45
    moderate: 25

portfolio:
  max_positions:
    conservative: 5.0
    moderate: 10.0
    aggressive: 20.0

screener:
  default_universe:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA
    - BRK.B
    - JPM
    - JNJ
    - V
    - PG
    - XOM
    - HD
    - MA
    - BAC
    - PFE
    - AVGO
    - CVX
    - COST

sectors:
  etfs:
    - { ticker: XLK, name: Technology }
    - { ticker: XLF, name: Financials }
    - { ticker: XLE, name: Energy }
    - { ticker: XLV, name: Health Care }
    - { ticker: XLI, name: Industrials }
    - { ticker: XLY, name: Consumer Disc. }
    - { ticker: XLP, name: Consumer Staples }
    - { ticker: XLRE, name: Real Estate }
    - { ticker: XLB, name: Materials }
    - { ticker: XLU, name: Utilities }
    - { ticker: XLC, name: Communication }

display:
  chart_height: 500
  max_news_articles: 10

logging:
  level: INFO
  max_bytes: 10485760
  backup_count: 3

# P12.1: Webhook notification settings
webhooks:
  slack_url: ""
  discord_url: ""
  telegram_token: ""
  telegram_chat_id: ""
  app_url: ""  # Deep link base URL for alert messages

# P12.2: Google Sheets settings
google_sheets:
  spreadsheet_id: ""
  sheet_name: "jaja-money"
  credentials_path: ""  # Path to service account JSON
  append_log: true

# P10.1: Digest settings
digest:
  schedule_hour: 8   # UTC hour for daily digest
  schedule_minute: 0
  email: ""           # Delivery email address

# P14.2: Cache backend (disk or redis)
cache_backend:
  type: "disk"  # "disk" or "redis"
  redis_url: "redis://localhost:6379/0"

# P14.3: API server settings
api_server:
  port: 8080
  api_key: ""  # Set JAJA_API_KEY env var instead for security

# P9.6: AI backend selection
# "sdk"  — use the anthropic Python SDK (requires ANTHROPIC_API_KEY)
# "cli"  — use the Claude Code CLI binary (uses your existing claude session/credentials)
ai_backend: "sdk"

# P24.3: Index Trend Gate (MA Filter)
# When SPY is below its 200-day SMA, apply a score penalty to all long signals.
index_trend_gate:
  enabled: true
  penalty_pts: 10  # Score points subtracted from long signals when gate is closed

# P23.1: Low Volatility Anomaly thresholds
low_vol:
  max_vol_60d_pct: 25.0  # Max 60-day annualised vol for low-vol screen

# P23.2: Shareholder Yield thresholds
shareholder_yield:
  min_total_yield_pct: 5.0  # Minimum combined dividend + buyback yield %

# P25.1: Cluster Insider Buying thresholds
insider_buying:
  min_buyers: 2
  min_buy_value: 200000  # Minimum combined dollar value of purchases

# P26.1: Volatility Risk Premium harvest thresholds
vrp:
  min_vrp_pts: 5.0  # IV − HV30 threshold for premium-selling signal
