version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CACHE_BACKEND=${CACHE_BACKEND:-disk}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Persist disk cache and user data between container restarts
      - jaja_data:/root/.jaja-money
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
        required: false

  # P14.3: API Server Mode (optional profile)
  api:
    build: .
    command: ["python", "server.py"]
    ports:
      - "8080:8080"
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JAJA_API_KEY=${JAJA_API_KEY:-}
      - JAJA_API_PORT=8080
      - CACHE_BACKEND=${CACHE_BACKEND:-disk}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - jaja_data:/root/.jaja-money
    restart: unless-stopped
    profiles:
      - server
    depends_on:
      redis:
        condition: service_healthy
        required: false

  # P14.2: Redis Cache Backend (optional profile)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - redis

volumes:
  jaja_data:
    driver: local
  redis_data:
    driver: local
