version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      # Persist disk cache and user data between container restarts
      - jaja_data:/root/.jaja-money
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jaja_data:
    driver: local
