name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install without torch/transformers for CI speed (mocked in tests)
          pip install streamlit finnhub-python python-dotenv plotly pandas scipy \
                      anthropic pytest pytest-cov pyyaml yfinance ruff

      - name: Lint with ruff
        run: |
          ruff check . --select=E,W,F --ignore=E501

      - name: Run tests with coverage
        env:
          FINNHUB_API_KEY: "test_key_ci"
          ANTHROPIC_API_KEY: "test_key_ci"
        run: |
          pytest tests/ -v \
            --ignore=tests/integration \
            --cov=src.analysis.factors \
            --cov=src.analysis.guardrails \
            --cov=src.trading.portfolio \
            --cov=src.data.sentiment \
            --cov=src.trading.watchlist \
            --cov=src.data.history \
            --cov=src.analysis.backtest \
            --cov=src.trading.screener \
            --cov=src.trading.sectors \
            --cov=src.analysis.portfolio_analysis \
            --cov=src.analysis.comparison \
            --cov=src.ui.alerts \
            --cov=src.ui.export \
            --cov=src.core.cache \
            --cov=src.core.config \
            --cov=src.analysis.ledger \
            --cov=src.analysis.ledger_check \
            --cov=src.analysis.retroactive \
            --cov=src.analysis.signal_decay \
            --cov=src.analysis.factor_attribution \
            --cov-report=term-missing \
            --cov-fail-under=50

  integration-tests:
    runs-on: ubuntu-latest
    # Only run integration tests on Python 3.11 to save CI time
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-integration-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-integration-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit finnhub-python python-dotenv plotly pandas \
                      anthropic pytest pytest-playwright pytest-timeout pyyaml \
                      yfinance ruff requests fastapi uvicorn[standard] pydantic

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run integration tests
        env:
          FINNHUB_API_KEY: "test_key_ci"
          ANTHROPIC_API_KEY: "test_key_ci"
        run: |
          pytest tests/integration/ -v \
            --browser chromium \
            --screenshot=only-on-failure \
            --output=test-results \
            -x \
            --timeout=120

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/

      - name: Upload integration screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-screenshots
          path: screenshots/
          if-no-files-found: ignore

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jaja-money:test .

      - name: Verify image
        run: docker image inspect jaja-money:test
